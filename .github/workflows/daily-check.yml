name: 每日仓库健康检查

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 00:00 执行
  workflow_dispatch:  # 允许手动触发

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 统计代码行数
        run: |
          echo "📊 仓库统计信息："
          echo "Python 文件数量: $(find . -name '*.py' | wc -l)"
          echo "总代码行数: $(find . -name '*.py' -exec wc -l {} + | tail -1)"
      
      - name: 检查 README 更新时间
        run: |
          echo "📝 README 最后修改: $(git log -1 --format=%cd README.md)"
